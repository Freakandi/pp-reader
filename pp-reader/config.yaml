---
# PP Reader — Home Assistant App manifest
# Ref: https://developers.home-assistant.io/docs/add-ons/configuration

name: PP Reader
version: "0.1.10"
slug: pp_reader
description: >
  Standalone Portfolio Performance (.portfolio) reader with a full-stack web UI.
  Parses protobuf files, calculates TWR/cost-basis metrics, and serves a
  Lit-based dashboard on port 8000.
url: https://github.com/Freakandi/pp-reader-app
arch:
  - aarch64
  - amd64
  - armv7

# ── Ports ────────────────────────────────────────────────────────────────────
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: "PP Reader web UI and REST API"

# ── Ingress (access via HA sidebar) ─────────────────────────────────────────
ingress: true
ingress_port: 8000
panel_icon: mdi:finance
panel_title: PP Reader

# ── Options (user-configurable in HA UI) ────────────────────────────────────
options:
  db_mode: "local"
  db_host: ""
  db_port: 5432
  db_name: "pp_reader"
  db_user: "pp_reader"
  db_password: ""
  portfolio_path: "/share/portfolios/my_portfolio.portfolio"
  file_poll_interval: 60
  enrich_interval: 3600
  log_level: INFO

schema:
  db_mode: list(local|external)
  db_host: str?
  db_port: int
  db_name: str
  db_user: str
  db_password: str?
  portfolio_path: str
  file_poll_interval: int
  enrich_interval: int
  log_level: list(DEBUG|INFO|WARNING|ERROR)

# ── Startup ──────────────────────────────────────────────────────────────────
startup: application
boot: auto

# ── Mapping ──────────────────────────────────────────────────────────────────
map:
  - config:ro    # /config  — HA configuration directory
  - share:ro     # /share   — HA shared storage
  - media:ro     # /media   — HA media storage

# ── Resources ────────────────────────────────────────────────────────────────
image: ghcr.io/freakandi/pp-reader-app/{arch}
