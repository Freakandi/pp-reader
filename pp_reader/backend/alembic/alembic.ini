# Alembic configuration for PP Reader
# Run from backend/ directory: alembic -c alembic/alembic.ini upgrade head

[alembic]
script_location = %(here)s
prepend_sys_path = %(here)s/..
version_path_separator = os

# Overridden programmatically by env.py from app.config.settings
sqlalchemy.url = postgresql+asyncpg://pp_reader:pp_reader@localhost:5432/pp_reader

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
